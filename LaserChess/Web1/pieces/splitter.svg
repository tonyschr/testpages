<?xml version="1.0" encoding="UTF-8"?>
<!--
  SPLITTER — Laser Chess piece
  ═══════════════════════════════════════════════════════════════
  Shape    : northward-pointing equilateral triangle
             apex (0, -18),  base corners (±15.6, 9)

  Sides at rotation 0:
    NW face (left diagonal)  : REFLECTIVE — "\" surface, bounces SE laser back
    NE face (right diagonal) : REFLECTIVE — "/" surface, bounces SW laser back
    N  face (apex)           : REFLECTIVE — laser going S splits into E + W
    S  face (base)           : VULNERABLE — only way to destroy this piece
    E, SE, SW, W             : PASS-THROUGH — no face; laser misses entirely

  Coordinate system
    • Origin (0,0) is the piece centre.
    • North  = up  = −Y direction.  Piece faces NORTH at rotation 0.
    • Canvas : viewBox="-24 -24 48 48"  (48×48 px, centred at origin)

  Colour conventions (no CSS custom properties):
    fill="inherit"       — body fill, provided by the game at runtime
    stroke="currentColor"— outline / accent, provided by the game at runtime
  ═══════════════════════════════════════════════════════════════
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-24 -24 48 48" width="96" height="96">

  <!-- Triangle body: apex at top (N), base at bottom (S) -->
  <polygon points="0,-18 15.6,9 -15.6,9"
           fill="inherit" stroke="currentColor" stroke-width="1.5"/>

  <!-- Reflective NW face (left diagonal) — highlighted -->
  <line x1="0" y1="-18" x2="-15.6" y2="9"
        stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Reflective NE face (right diagonal) — highlighted -->
  <line x1="0" y1="-18" x2="15.6" y2="9"
        stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>

</svg>

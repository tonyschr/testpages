<?xml version="1.0" encoding="UTF-8"?>
<!--
  SPLITTER — Laser Chess piece
  ═══════════════════════════════════════════════════════════════
  Two non-consecutive reflective sides: North-East (NE) and South-East (SE).
  Splits an incoming laser into two perpendicular outgoing beams
  (one 90° CW, one 90° CCW from the incoming direction).

  Example at rotation 0:
    • Laser going SW hits NE face → splits into NW + SE beams
    • Laser going NW hits SE face → splits into NE + SW beams

  Coordinate system
    • Origin (0,0) is the piece centre.
    • North  = up  = −Y direction.  Piece faces NORTH at rotation 0.
    • Canvas : viewBox="-24 -24 48 48"

  CSS custom properties:
    --pf  body fill       fill="var(--pf,#1a3a6a)"
    --ps  stroke/accent   stroke="var(--ps,#4a90d9)"
  ═══════════════════════════════════════════════════════════════
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-24 -24 48 48" width="96" height="96">

  <!-- Body: diamond -->
  <polygon points="0,-21 21,0 0,21 -21,0"
           fill="var(--pf,#1a3a6a)"
           stroke="var(--ps,#4a90d9)"
           stroke-width="1.5"/>

  <!-- Reflective NE edge (top-right face) -->
  <line x1="0" y1="-21" x2="21" y2="0"
        stroke="var(--ps,#4a90d9)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Reflective SE edge (bottom-right face) -->
  <line x1="21" y1="0" x2="0" y2="21"
        stroke="var(--ps,#4a90d9)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Split indicators: faint cross suggesting the two outgoing directions -->
  <line x1="-13" y1="0" x2="13" y2="0"
        stroke="#88ccff" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="0" y1="-13" x2="0" y2="13"
        stroke="#88ccff" stroke-width="1.5" stroke-opacity="0.7"/>

</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  MIRROR — Laser Chess piece
  ═══════════════════════════════════════════════════════════════
  Shape    : right isoceles triangle, right angle at SE corner.
             Vertices: SW(-17,17), NE(17,-17), SE(17,17)

  Sides at rotation 0:
    "/" hypotenuse (SW→NE) spans 3 face slots — all REFLECTIVE:
      W  face: laser going E  → exits going N   (90°)
      NW face: laser going SE → exits going NW  (back-scatter)
      N  face: laser going S  → exits going W   (90°)
    S face (bottom leg): VULNERABLE
    E face (right leg) : VULNERABLE

  Reflection rule: "/" surface (REFLECT_SLASH)

  Coordinate system
    • Origin (0,0) is the piece centre.
    • North  = up  = −Y direction.  Piece faces NORTH at rotation 0.
    • Canvas : viewBox="-24 -24 48 48"  (48×48 px, centred at origin)

  Colour conventions (no CSS custom properties):
    fill="inherit"       — body fill, provided by the game at runtime
    fill="currentColor"  — accent/highlight, provided by the game at runtime
    stroke="currentColor"— outline, same accent colour
  ═══════════════════════════════════════════════════════════════
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="-24 -24 48 48" width="96" height="96">

  <!-- Triangle body: right angle at SE (bottom-right), "/" hypotenuse SW→NE -->
  <polygon points="-17,17 17,-17 17,17"
           fill="inherit" stroke="currentColor" stroke-width="1.5"/>

  <!-- Reflective "/" hypotenuse: SW(-17,17) → NE(17,-17) — bright accent -->
  <line x1="-17" y1="17" x2="17" y2="-17"
        stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>

</svg>
